name: Telegram Alert - JDA Auction

on:
  schedule:
    - cron: '0 4 * * *'    # 9:30 AM IST
    - cron: '0 10 * * *'   # 3:30 PM IST
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python plot_alert.py

      - name: Save seen_auctions.txt to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_auctions.txt
          git diff --staged --quiet || git commit -m "Update seen auctions [skip ci]"
          git push
        continue-on-error: true

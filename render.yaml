services:
  - type: cron
    name: jda-auction-alert
    runtime: python
    schedule: "30 4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python plot_alert.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
